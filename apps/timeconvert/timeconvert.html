<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>时间转换器</title>
    <link rel="stylesheet" href="timeconvert.css">
</head>
<body>
    <div class="container">
        <!-- 时间戳与时间互转 -->
        <div class="section-title">时间戳与时间互转</div>
        <div class="section section-timestamp">
        <div class="row row-unit-selector">
            <select id="timestamp-unit">
                <option value="s">Second(s)</option>
                <option value="ms">Millisecond(ms)</option>
            </select>
            <span class="comment-inline">1s = 1000ms</span>
            <span class="comment-inline">1ms = 1000μs</span>
            <span class="comment-inline">1μs = 1000ns</span>
            <span class="comment-inline">1ns = 1000ps</span>
        </div>

        <hr class="separator">

        <div class="row">
            <label>TimeStamp:</label>
            <input type="number" id="timestamp-input" value="0" min="0">
            <div class="arrow-buttons">
                <button id="btn-ts2time" class="arrow-btn" title="Timestamp → Time">→</button>
                <button id="btn-time2ts" class="arrow-btn" title="Time → Timestamp">←</button>
            </div>
            <label>Time:</label>
            <input type="text" id="time-input" placeholder="yyyy-MM-dd HH:mm:ss">
        </div>

        <hr class="separator">

        <!-- 当前时间实时显示 -->
        <div class="row">
            <label>Current timestamp:</label>
            <input type="text" id="current-timestamp" class="current-timestamp" readonly>
            <label>Current time:</label>
            <input type="text" id="current-time" class="current-time" readonly>
            <button id="btn-pause">Pause</button>
        </div>

        </div>

        <!-- 时区转换 -->
        <div class="section-title">时区转换</div>
        <div class="section section-timezone">
        <div class="tz-grid">
            <div class="tz-col-time">
                <div class="row">
                    <label>From Time:</label>
                    <input type="datetime-local" id="from-time" step="60">
                </div>
                <div class="row">
                    <label>To Time:</label>
                    <input type="text" id="to-time" class="tz-out" readonly>
                </div>
            </div>
            <div class="tz-col-zone">
                <div class="row">
                    <label>From Timezone:</label>
                    <select id="from-tz" class="tz-select"></select>
                </div>
                <div class="row">
                    <label>To Timezone:</label>
                    <select id="to-tz" class="tz-select"></select>
                </div>
            </div>
            <div class="tz-col-swap">
                <button id="btn-swap">Swap</button>
            </div>
        </div>
        </div>
    </div>

    <script src="timeconvert.js"></script>
</body>
</html>
